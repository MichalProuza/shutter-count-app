<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0b"/>
      <stop offset="100%" style="stop-color:#111113"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8ff47;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#e8ff47;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#222226" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#222226" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#222226" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#222226" stroke-width="1"/>

  <!-- Accent glow top-left -->
  <rect width="600" height="2" fill="#e8ff47" opacity="0.6"/>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="4" height="310" fill="#e8ff47" rx="2"/>

  <!-- Logo text: SHUTTER -->
  <text x="112" y="270" font-family="Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="-3" fill="#e8e8ea">SHUTTER</text>

  <!-- Logo text: COUNT (accent color) -->
  <text x="112" y="380" font-family="Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="-3" fill="#e8ff47">COUNT</text>

  <!-- Subtitle -->
  <text x="112" y="435" font-family="monospace" font-size="20" letter-spacing="4" fill="#55555c" text-transform="uppercase">FREE CAMERA SHUTTER COUNT CHECKER</text>

  <!-- Feature badges -->
  <rect x="112" y="468" width="110" height="32" rx="6" fill="#222226"/>
  <text x="167" y="489" font-family="monospace" font-size="14" fill="#e8e8ea" text-anchor="middle">Canon CR3</text>

  <rect x="234" y="468" width="100" height="32" rx="6" fill="#222226"/>
  <text x="284" y="489" font-family="monospace" font-size="14" fill="#e8e8ea" text-anchor="middle">Nikon NEF</text>

  <rect x="346" y="468" width="100" height="32" rx="6" fill="#222226"/>
  <text x="396" y="489" font-family="monospace" font-size="14" fill="#e8e8ea" text-anchor="middle">Sony ARW</text>

  <rect x="458" y="468" width="120" height="32" rx="6" fill="#222226"/>
  <text x="518" y="489" font-family="monospace" font-size="14" fill="#e8e8ea" text-anchor="middle">Fujifilm RAF</text>

  <!-- Privacy badge -->
  <rect x="112" y="524" width="220" height="36" rx="8" fill="#1a1f0a"/>
  <text x="222" y="547" font-family="monospace" font-size="15" fill="#e8ff47" text-anchor="middle">🔒 No upload — 100% local</text>

  <!-- Right side: decorative camera icon area -->
  <circle cx="980" cy="315" r="160" fill="#111113" stroke="#222226" stroke-width="2"/>
  <circle cx="980" cy="315" r="120" fill="#0a0a0b" stroke="#333338" stroke-width="1"/>
  <circle cx="980" cy="315" r="80" fill="none" stroke="#e8ff47" stroke-width="2" opacity="0.3"/>
  <circle cx="980" cy="315" r="50" fill="none" stroke="#e8ff47" stroke-width="1" opacity="0.5"/>
  <circle cx="980" cy="315" r="8" fill="#e8ff47"/>

  <!-- Shutter lines -->
  <line x1="980" y1="195" x2="980" y2="230" stroke="#e8ff47" stroke-width="2" opacity="0.4"/>
  <line x1="980" y1="400" x2="980" y2="435" stroke="#e8ff47" stroke-width="2" opacity="0.4"/>
  <line x1="860" y1="315" x2="895" y2="315" stroke="#e8ff47" stroke-width="2" opacity="0.4"/>
  <line x1="1065" y1="315" x2="1100" y2="315" stroke="#e8ff47" stroke-width="2" opacity="0.4"/>

  <!-- Counter display -->
  <rect x="880" y="410" width="200" height="50" rx="8" fill="#1a1f0a" stroke="#e8ff47" stroke-width="1" opacity="0.6"/>
  <text x="980" y="444" font-family="monospace" font-size="22" font-weight="bold" fill="#e8ff47" text-anchor="middle">12,847</text>

  <!-- Domain -->
  <text x="1100" y="600" font-family="monospace" font-size="18" fill="#55555c" text-anchor="end">shuttercount.app</text>
</svg>
